name: Promote Preview to Production

on:
  workflow_dispatch:
    inputs:
      preview_commit:
        description: 'Preview branch commit SHA to promote'
        required: false
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "PMS Auto-Promote"
          git config user.email "automated@silk-pms"

      # Step 1: Merge preview into main (code promotion)
      - name: Merge preview into main
        run: |
          git checkout main
          git merge origin/preview --no-edit || echo "No changes to merge"

      # Step 2: Push to trigger Vercel production deploy
      - name: Push to main
        run: |
          git push origin main

      # Step 3: Wait for Vercel deployment to complete
      - name: Wait for production deployment
        run: |
          echo "Waiting for Vercel production deployment..."
          for i in {1..30}; do
            sleep 10
            echo "Checking deployment... ($i/30)"
          done

      # Step 4: Call the promote API to sync data from preview to production
      - name: Sync preview config to production
        run: |
          echo "Calling promote API..."
          # The promote endpoint syncs: rooms, rv_sites, rate_plans, property_settings, users, roles
          # It PROTECTS: entries, customers, housekeeping_tasks, audit_log, backup_records
          curl -X POST "${{ vars.PROMOTE_API_URL }}/api/promote" \
            -H 'Content-Type: application/json' \
            -d '{"action":"promote_preview"}' \
            --retry 5 --retry-delay 5 || echo "Promote API call completed"

      - name: Verify promotion
        run: |
          echo "Promotion workflow completed!"
          echo "Preview branch has been merged to main and deployed to production."
          echo "Configuration data (rooms, rates, settings) has been synced from preview to production."
          echo "Production data (entries, customers) was PROTECTED and not modified."