name: Promote Preview to Production (Full Automation)

on:
  workflow_dispatch:
    inputs:
      backup_before_promote:
        description: 'Backup production data to preview before swap'
        required: true
        default: 'true'
        type: boolean

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      deployments: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'preview'
          fetch-depth: 0
          persist-credentials: false

      - name: Get Vercel env vars
        run: |
          echo "Fetching environment variables from Vercel..."
          PREVIEW_URL=$(curl -s "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_API_TOKEN }}" \
            | jq -r '.envs[] | select(.key == "PREVIEW_SUPABASE_URL") | .value' 2>/dev/null || echo "")
          PROD_URL=$(curl -s "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_API_TOKEN }}" \
            | jq -r '.envs[] | select(.key == "NEXT_PUBLIC_SUPABASE_URL") | .value' 2>/dev/null || echo "")
          echo "PREVIEW_URL=$PREVIEW_URL"
          echo "PROD_URL=$PROD_URL"
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
          echo "PROD_URL=$PROD_URL" >> $GITHUB_ENV

      - name: Swap Vercel env vars
        run: |
          set +e
          echo "Swapping database URLs..."
          PREVIEW_DB="${{ env.PREVIEW_URL }}"
          PROD_DB="${{ env.PROD_URL }}"
          echo "Preview DB: $PREVIEW_DB"
          echo "Production DB: $PROD_DB"

          echo "Updating NEXT_PUBLIC_SUPABASE_URL..."
          curl -s -X PATCH "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env/NEXT_PUBLIC_SUPABASE_URL" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"value": "'"$PREVIEW_DB"'", "type": "encrypted"}'

          echo "Updating PREVIEW_SUPABASE_URL..."
          curl -s -X PATCH "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env/PREVIEW_SUPABASE_URL" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"value": "'"$PROD_DB"'", "type": "encrypted"}'

          echo "Environment variables swapped!"

      - name: Merge and push to main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "PMS Auto-Promote"
          git config --global user.email "automated@silk-pms"
          git checkout main
          git fetch origin preview
          git merge origin/preview --no-edit
          git push https://x-access-token:$GH_TOKEN@github.com/apatel26/silk-pms.git main
          echo "Code merged and pushed to main"

      - name: Wait for deployment
        run: |
          echo "Waiting for Vercel production deployment..."
          DEPLOY_DONE=false
          for i in {1..30}; do
            DEPLOYMENT=$(curl -s "https://api.vercel.com/v13/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&target=production" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_API_TOKEN }}")
            STATE=$(echo $DEPLOYMENT | jq -r '.deployments[0].state' 2>/dev/null)
            DEPLOY_UID=$(echo $DEPLOYMENT | jq -r '.deployments[0].uid' 2>/dev/null)
            echo "Check $i/30 - State: $STATE"
            if [ "$STATE" = "READY" ]; then
              echo "=============================================="
              echo "Deployment READY!"
              echo "URL: https://vercel.com/apatel26s-projects/silk-pms/$DEPLOY_UID"
              echo "=============================================="
              DEPLOY_DONE=true
              break
            fi
            sleep 10
          done
          if [ "$DEPLOY_DONE" = false ]; then
            echo "Deployment check completed - please verify manually"
          fi

      - name: Complete
        run: |
          echo "==============================================="
          echo "PROMOTION COMPLETED SUCCESSFULLY!"
          echo "==============================================="